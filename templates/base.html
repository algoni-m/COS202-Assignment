<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}CBT Engine{% endblock %}</title>
  <style>
    /* ============================================================
       GLOBAL RESET & CSS VARIABLES
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161a23;
      --card:      #1c2130;
      --border:    #272d3d;
      --accent:    #f5c842;
      --accent2:   #e0a820;
      --text:      #e8eaf0;
      --muted:     #7a85a0;
      --correct:   #2ecc71;
      --wrong:     #e74c3c;
      --radius:    18px;
      --font-head: 'Georgia', 'Times New Roman', serif;
      --font-body: 'Trebuchet MS', 'Lucida Sans Unicode', sans-serif;
      --shadow:    0 8px 40px rgba(0,0,0,0.5);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        linear-gradient(rgba(245,200,66,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,200,66,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .wrapper {
      width: 100%;
      max-width: 640px;
      animation: fadeUp 0.45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       CARD
    ============================================================ */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 44px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
    }

    /* ============================================================
       TYPOGRAPHY
    ============================================================ */
    h1 {
      font-family: var(--font-head);
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
      color: var(--text);
    }

    h2 {
      font-family: var(--font-head);
      font-size: clamp(1.05rem, 3vw, 1.25rem);
      line-height: 1.5;
      margin-bottom: 28px;
      color: var(--text);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* ============================================================
       INPUTS
    ============================================================ */
    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 1rem;
      color: var(--text);
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 8px;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    /* ============================================================
       BUTTONS
    ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #0d0f14;
      width: 100%;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }
    .btn-primary:hover  { background: var(--accent2); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,200,66,0.3); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ============================================================
       CHIPS / META
    ============================================================ */
    .meta-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .chip span { color: var(--accent); font-weight: 600; }

    /* ============================================================
       ERROR
    ============================================================ */
    .err-msg {
      color: var(--wrong);
      font-size: 0.83rem;
      margin-bottom: 14px;
      padding: 10px 14px;
      background: rgba(231,76,60,0.08);
      border: 1px solid rgba(231,76,60,0.25);
      border-radius: 8px;
    }

    /* ============================================================
       BRAND
    ============================================================ */
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .brand-name {
      font-family: var(--font-head);
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 520px) {
      .card { padding: 32px 22px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
